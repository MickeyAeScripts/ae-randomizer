name: Build ZXP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ZXPSignCmd
        run: |
          curl -L -o ZXPSignCmd \
            https://raw.githubusercontent.com/Adobe-CEP/CEP-Resources/master/ZXPSignCMD/4.1.3/macOS/ZXPSignCmd
          chmod +x ZXPSignCmd
          ls -la ZXPSignCmd
          file ZXPSignCmd

      - name: Stage extension folder
        run: |
          mkdir -p build/Randomizer
          cp -r CSXS client jsx build/Randomizer/
          ls -la build/Randomizer

      - name: Generate self-signed certificate
        run: |
          ./ZXPSignCmd -selfSignedCert US CA \
            "MickeyAeScripts" "Mickey Perry" \
            "randomizer-pass" cert.p12

      - name: Sign extension into ZXP
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          OUT="Randomizer-${TAG}.zxp"
          ./ZXPSignCmd -sign build/Randomizer "${OUT}" cert.p12 randomizer-pass \
            -tsa http://timestamp.digicert.com
          ls -la "${OUT}"
          echo "OUT=${OUT}" >> $GITHUB_ENV

      - name: Verify ZXP
        run: ./ZXPSignCmd -verify "${OUT}" -certinfo

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Randomizer-zxp
          path: ${{ env.OUT }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.OUT }}
            scripts/install.ps1
            scripts/uninstall.ps1
          generate_release_notes: true
          body: |
            ## Install (Windows, one click)

            1. Download `${{ env.OUT }}` **and** `install.ps1` below into the same folder.
            2. Right-click `install.ps1` → **Run with PowerShell**.
               (Or in a PowerShell window: `./install.ps1`.)
            3. Restart After Effects. Open: **Window → Extensions → Randomizer**.

            The script extracts the `.zxp`, drops it in your per-user CEP
            extensions folder, and enables PlayerDebugMode for CSXS 10-12
            so AE will load the self-signed bundle.

            ## Install via an extension manager (if you prefer GUI)

            Open one of the free tools and drop `${{ env.OUT }}` in:
            - **[Anastasiy's Extension Manager](https://install.anastasiy.com/)** — usually works first try.
            - **[ZXP Installer (aescripts)](https://aescripts.com/learn/zxp-installer/)** — sometimes errors with "status = -193"; use the PowerShell script above instead.

            ## Notes

            - Works on After Effects 2022 and newer.
            - Signed with a self-signed cert (no paid Adobe code-signing involved).
            - Built and signed in GitHub Actions on every `v*` tag.
            - To uninstall: run `uninstall.ps1`, or delete `%APPDATA%\Adobe\CEP\extensions\Randomizer\`.
